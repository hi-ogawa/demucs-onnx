name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # Limit model export so it does not saturate the CI runner.
      # https://docs.pytorch.org/docs/stable/threading_environment_variables.html
      OMP_NUM_THREADS: 2

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - run: corepack enable

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache model export inputs
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cache/torch/hub/checkpoints
            ~/.cache/huggingface/hub
            data/onnx
            data/onnx-split
          key: ${{ runner.os }}-htdemucs-${{ hashFiles('uv.lock', 'tools/model-export-v2/uv.lock', 'tools/model-export/build_models.py', 'tools/model-export-v2/*.py') }}

      - run: pnpm install --frozen-lockfile

      - run: pnpm build-model htdemucs

      - run: pnpm build-model-v2 htdemucs

      - run: |
          pnpm verify-parity \
            --onnx data/onnx/htdemucs.onnx \
            --stripped-onnx data/onnx-lean/htdemucs.onnx \
            --model htdemucs

      - run: |
          pnpm cli-separate \
            --name htdemucs \
            --two-stems bass \
            --two-stems-mix minus \
            fixtures/sine-10s.wav data/ci-output/legacy
          test -s data/ci-output/legacy/bass.wav
          test -s data/ci-output/legacy/no_bass.wav

      - run: |
          pnpm cli-separate-v2 \
            --two-stems bass \
            --two-stems-mix minus \
            fixtures/sine-10s.wav data/ci-output/native
          test -s data/ci-output/native/bass.wav
          test -s data/ci-output/native/no_bass.wav

      - run: pnpm build-wasm

      - run: |
          pnpm wasm-separate \
            --models data/onnx-split \
            --name htdemucs \
            --two-stems bass \
            --two-stems-mix minus \
            fixtures/sine-10s.wav data/ci-output/wasm
          uv run --no-sync tools/compare-wav.py \
            data/ci-output/native data/ci-output/wasm

      - run: pnpm lint-check

      - run: pnpm -C packages/app exec playwright install chromium --with-deps --no-shell

      - run: pnpm test-e2e
