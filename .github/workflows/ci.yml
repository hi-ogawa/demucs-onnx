name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  full-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      OMP_NUM_THREADS: 2

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - uses: taiki-e/install-action@v2.83.1
        with:
          tool: wasm-pack@0.15.0

      - name: Cache model export inputs
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cache/torch/hub/checkpoints
            data/onnx
          key: ${{ runner.os }}-htdemucs-${{ hashFiles('uv.lock', 'tools/model-export/build_models.py', 'tools/model-export/export_onnx.py') }}

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:model

      - run: |
          pnpm separate -- \
            --name htdemucs \
            --two-stems bass \
            --method minus \
            fixtures/sine-10s.wav data/ci-output
          test -s data/ci-output/bass.wav
          test -s data/ci-output/no_bass.wav

      - run: pnpm build:wasm

      - run: pnpm --filter demucs-onnx-app exec playwright install --with-deps chromium

      - run: pnpm test
